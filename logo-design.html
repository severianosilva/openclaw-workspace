<!DOCTYPE html>
<html>
<head>
<style>
  body { margin: 0; padding: 40px; background: #1A1A1A; color: #fff; font-family: 'Lato', sans-serif; }
  .logo-container { background: #fff; border-radius: 8px; padding: 60px; text-align: center; max-width: 500px; }
  .gold { color: #C4A484; }
  .dark { color: #1A1A1A; font-family: 'Playfair Display', serif; }
  .symbol { font-size: 80px; margin-bottom: 20px; }
  .title { font-size: 32px; font-weight: bold; margin: 10px 0; }
  .subtitle { font-size: 18px; color: #666; }
  .license { font-size: 16px; color: #999; margin-top: 25px; }
  .colors { margin-top: 50px; background: #C4A484; color: #1A1A1A; padding: 30px; border-radius: 8px; }
  .color-swatch { display: inline-block; width: 70px; height: 70px; border-radius: 8px; margin-right: 15px; vertical-align: middle; }
</style>
</head>
<body>
  <div class="logo-container">
    <div class="symbol">⚖️</div>
    <div class="title dark">Severiano Silva Advocacia</div>
    <div class="subtitle">Direito Especializado</div>
    <div class="license">OAB/MG 134.259</div>
  </div>
  
  <div class="colors">
    <h3 style="margin-top:0">Paleta de Cores Nobres</h3>
    <span class="color-swatch" style="background:#1A1A1A;"></span>
    <span class="color-swatch" style="background:#C4A484;"></span>
    <span class="color-swatch" style="background:#E8E8E8;"></span>
    <span class="color-swatch" style="background:#FFFFFF; border:1px solid #ddd;"></span>
  </div>
</body>
</html>
