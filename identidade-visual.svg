<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="600" fill="#1A1A1A"/>
  
  <!-- Title -->
  <text x="50" y="50" font-family="Playfair Display, serif" font-size="28" fill="#FFFFFF" font-weight="bold">
    Severiano Silva Advocacia
  </text>
  
  <!-- Logo Card -->
  <g transform="translate(50,80)">
    <rect width="300" height="180" fill="#FFFFFF" rx="8"/>
    <text x="150" y="60" font-family="Playfair Display, serif" font-size="20" fill="#1A1A1A" text-anchor="middle" font-weight="bold">
      Severiano Silva Advocacia
    </text>
    <text x="150" y="90" font-family="Lato, sans-serif" font-size="14" fill="#666666" text-anchor="middle">
      Direito Especializado
    </text>
    <text x="150" y="110" font-family="Lato, sans-serif" font-size="12" fill="#999999" text-anchor="middle">
      OAB/MG 134.259
    </text>
    <text x="150" y="150" font-size="48" text-anchor="middle">⚖️</text>
  </g>
  
  <!-- Color Palette -->
  <g transform="translate(400,100)">
    <text x="0" y="0" font-family="Lato, sans-serif" font-size="18" fill="#FFFFFF" font-weight="bold">
      Paleta de Cores
    </text>
    <rect x="0" y="20" width="60" height="60" fill="#1A1A1A" rx="4"/>
    <text x="30" y="60" font-family="monospace" font-size="10" fill="#FFFFFF" text-anchor="middle">#1A1A1A</text>
    
    <rect x="80" y="20" width="60" height="60" fill="#C4A484" rx="4"/>
    <text x="110" y="60" font-family="monospace" font-size="10" fill="#1A1A1A" text-anchor="middle">#C4A484</text>
    
    <rect x="160" y="20" width="60" height="60" fill="#E8E8E8" rx="4"/>
    <text x="190" y="60" font-family="monospace" font-size="10" fill="#1A1A1A" text-anchor="middle">#E8E8E8</text>
    
    <rect x="240" y="20" width="60" height="60" fill="#FFFFFF" rx="4" stroke="#ddd"/>
    <text x="270" y="60" font-family="monospace" font-size="10" fill="#1A1A1A" text-anchor="middle">#FFFFFF</text>
  </g>
  
  <!-- Services -->
  <g transform="translate(50,320)">
    <text x="0" y="0" font-family="Lato, sans-serif" font-size="18" fill="#FFFFFF" font-weight="bold">
      Áreas de Atuação
    </text>
    <text x="0" y="40" font-family="Lato, sans-serif" font-size="14" fill="#C4A484">▸ Direito Bancário</text>
    <text x="0" y="65" font-family="Lato, sans-serif" font-size="14" fill="#C4A484">▸ Direito Imobiliário</text>
    <text x="0" y="90" font-family="Lato, sans-serif" font-size="14" fill="#C4A484">▸ INSS</text>
    <text x="0" y="115" font-family="Lato, sans-serif" font-size="14" fill="#C4A484">▸ Direito Civil</text>
    <text x="0" y="140" font-family="Lato, sans-serif" font-size="14" fill="#C4A484">▸ Contratos</text>
  </g>
  
  <!-- Typography -->
  <g transform="translate(450,320)">
    <text x="0" y="0" font-family="Lato, sans-serif" font-size="18" fill="#FFFFFF" font-weight="bold">
      Tipografia
    </text>
    <text x="0" y="40" font-family="Playfair Display, serif" font-size="24" fill="#FFFFFF">Playfair Display</text>
    <text x="0" y="65" font-family="Lato, sans-serif" font-size="14" fill="#999">Serifada elegante para títulos</text>
    
    <text x="0" y="110" font-family="Lato, sans-serif" font-size="24" fill="#FFFFFF">Lato</text>
    <text x="0" y="135" font-family="Lato, sans-serif" font-size="14" fill="#999">Sans-serif clean para textos</text>
  </g>
</svg>