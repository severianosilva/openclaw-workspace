<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="200" viewBox="0 0 500 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fundo branco -->
  <rect width="500" height="200" fill="#FFFFFF" rx="8"/>
  
  <!-- Símbolo balança estilizada -->
  <g transform="translate(60,60)">
    <!-- Base da balança -->
    <path d="M50 20 L50 50" stroke="#C4A484" stroke-width="3"/>
