    <circle cx="30" cy="20" r="15" fill="#C4A484" stroke="#1A1A1A" stroke-width="1"/>
    <circle cx="70" cy="20" r="15" fill="#C4A484" stroke="#1A1A1A" stroke-width="1"/>
  </g>
  
  <!-- Texto -->
  <text x="120" y="55" font-family="Playfair Display, serif" font-size="24" fill="#1A1A1A" font-weight="bold">
    Severiano Silva Advocacia
  </text>
  <text x="120" y="85" font-family="Lato, sans-serif" font-size="14" fill="#666666">
    Direito Especializado
  </text>
  <text x="120" y="110" font-family="Lato, sans-serif" font-size="12" fill="#999999">
